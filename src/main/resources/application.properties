# Conexao com o banco de dados PostgreSQL via variaveis de ambiente.
# Em desenvolvimento local, use um arquivo .env (gitignored) ou
# src/main/resources/application-local.properties (gitignored).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/esteticadesk_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Servidor web (Render injeta PORT; local usa 8080)
server.port=${PORT:${SERVER_PORT:8080}}

# Configuracao do Hibernate/JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# Thymeleaf
spring.thymeleaf.cache=false

# Configuracao do Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholder-replacement=false
