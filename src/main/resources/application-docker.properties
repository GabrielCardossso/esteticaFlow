# Perfil docker: app dentro da rede Compose fala com o servico "postgres"
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/esteticadesk_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:esteticadesk}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:esteticadesk}

spring.jpa.show-sql=false
spring.thymeleaf.cache=true
logging.level.root=INFO
logging.level.org.springframework.web=INFO
