# Desenvolvimento local apontando para o PostgreSQL do Docker (porta 5433).
# Credenciais vêm do ambiente / .env (veja .env.example). Nao versionar senhas reais.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/esteticadesk_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:esteticadesk}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=false
spring.thymeleaf.cache=false
logging.level.root=INFO
