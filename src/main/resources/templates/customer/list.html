<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Clientes')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="page-header">
            <h1 class="page-title">Clientes</h1>
            <div class="spacer"></div>
            <a th:href="@{/clientes/novo}" class="btn btn-primary">+ Novo cliente</a>
        </div>

        <form method="get" th:action="@{/clientes}" class="filter-bar">
            <input type="text" name="busca" th:value="${busca}"
                   placeholder="Buscar por nome, telefone, CPF/CNPJ, e-mail ou placa"/>
            <select name="ativos">
                <option th:value="true" th:selected="${ativos}">Ativos</option>
                <option th:value="false" th:selected="${!ativos}">Todos</option>
            </select>
            <select name="ordenacao">
                <option value="nome" th:selected="${ordenacao == 'nome'}">Ordenar por nome</option>
                <option value="ultimo_atendimento" th:selected="${ordenacao == 'ultimo_atendimento'}">Último atendimento</option>
                <option value="valor_gasto" th:selected="${ordenacao == 'valor_gasto'}">Valor gasto</option>
                <option value="relacionamento" th:selected="${ordenacao == 'relacionamento'}">Relacionamento</option>
            </select>
            <button type="submit" class="btn btn-secondary">Buscar</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Último atendimento</th>
                <th>Atendimentos</th>
                <th>Total gasto</th>
                <th>Relacionamento</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${clientes.isEmpty()}">
                <td colspan="8" class="table-empty">Nenhum cliente encontrado.</td>
            </tr>
            <tr th:each="cliente : ${clientes}">
                <td>
                    <a class="table-link" th:href="@{/clientes/{id}(id=${cliente.id()})}"
                       th:text="${cliente.nome()}"></a>
                </td>
                <td th:text="${cliente.telefoneFormatado()}"></td>
                <td th:text="${cliente.ultimoAtendimentoFormatado()}"></td>
                <td th:text="${cliente.totalAtendimentos()}"></td>
                <td th:text="${cliente.valorTotalFormatado()}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="${' rel-' + cliente.relacionamento().name().toLowerCase()}"
                          th:text="${cliente.relacionamento().rotulo()}"
                          th:title="${cliente.relacionamento().descricao()}"></span>
                </td>
                <td th:text="${cliente.ativo()} ? 'Ativo' : 'Inativo'"></td>
                <td class="actions">
                    <a th:if="${cliente.linkWhatsApp() != null}"
                       th:href="${cliente.linkWhatsApp()}"
                       class="btn btn-whatsapp btn-sm"
                       target="_blank" rel="noopener noreferrer"
                       title="Abrir WhatsApp"
                       aria-label="Abrir WhatsApp do cliente">WhatsApp</a>
                    <a th:href="@{/clientes/{id}(id=${cliente.id()})}"
                       class="btn btn-secondary btn-sm">Detalhes</a>
                    <a th:href="@{/clientes/{id}/editar(id=${cliente.id()})}"
                       class="btn btn-secondary btn-sm">Editar</a>
                    <form th:if="${cliente.ativo()}" th:action="@{/clientes/{id}/inativar(id=${cliente.id()})}"
                          method="post" data-confirm="Inativar este cliente?">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-danger btn-sm">Inativar</button>
                    </form>
                    <form th:unless="${cliente.ativo()}" th:action="@{/clientes/{id}/reativar(id=${cliente.id()})}"
                          method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-primary btn-sm">Reativar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
