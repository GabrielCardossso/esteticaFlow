<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Cliente')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="page-header">
            <h1 class="page-title" th:text="${cliente.id() == null} ? 'Novo cliente' : 'Editar cliente'"></h1>
            <div class="spacer"></div>
            <a th:href="@{/clientes}" class="btn btn-secondary">Voltar</a>
        </div>

        <div class="card" style="max-width:960px;">
            <form th:action="${cliente.id() == null} ? @{/clientes} : @{/clientes/{id}(id=${cliente.id()})}"
                  th:object="${cliente}" method="post">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <input th:if="*{id != null}" type="hidden" th:field="*{id}"/>

                <h2 style="margin-top:0;">Dados do cliente</h2>
                <div class="form-grid">
                    <label for="nome">Nome *</label>
                    <div>
                        <input id="nome" type="text" th:field="*{nome}" placeholder="Nome completo" required
                               maxlength="150" autocomplete="name"/>
                        <div class="error-text" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                    </div>

                    <label for="cpfCnpj">CPF/CNPJ</label>
                    <div>
                        <input id="cpfCnpj" type="text" th:field="*{cpfCnpj}" placeholder="000.000.000-00"
                               data-mask="cpf-cnpj" maxlength="18" inputmode="numeric" autocomplete="off"/>
                        <div class="error-text" th:if="${#fields.hasErrors('cpfCnpj')}" th:errors="*{cpfCnpj}"></div>
                    </div>

                    <label for="telefone">Telefone *</label>
                    <div>
                        <input id="telefone" type="tel" th:field="*{telefone}" placeholder="(00) 00000-0000" required
                               data-mask="telefone" maxlength="15" inputmode="tel" autocomplete="tel"/>
                        <div class="error-text" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></div>
                    </div>

                    <label for="email">E-mail</label>
                    <div>
                        <input id="email" type="email" th:field="*{email}" placeholder="email@exemplo.com"
                               maxlength="150" autocomplete="email"/>
                        <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                </div>

                <h2 style="margin-top:28px;">Endereço de entrega</h2>
                <div class="form-grid">
                    <label for="cep">CEP</label>
                    <div>
                        <input id="cep" type="text" th:field="*{cep}" placeholder="00000-000"
                               data-mask="cep" maxlength="9" inputmode="numeric" autocomplete="postal-code"/>
                        <div class="error-text" th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}"></div>
                    </div>

                    <label for="logradouro">Logradouro</label>
                    <div>
                        <input id="logradouro" type="text" th:field="*{logradouro}" placeholder="Rua, avenida..."
                               maxlength="150" autocomplete="address-line1"/>
                        <div class="error-text" th:if="${#fields.hasErrors('logradouro')}" th:errors="*{logradouro}"></div>
                    </div>

                    <label for="numero">Número</label>
                    <div>
                        <input id="numero" type="text" th:field="*{numero}" maxlength="20" autocomplete="address-line2"/>
                        <div class="error-text" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>
                    </div>

                    <label for="complemento">Complemento</label>
                    <div>
                        <input id="complemento" type="text" th:field="*{complemento}" maxlength="100"
                               autocomplete="address-line3"/>
                        <div class="error-text" th:if="${#fields.hasErrors('complemento')}" th:errors="*{complemento}"></div>
                    </div>

                    <label for="bairro">Bairro</label>
                    <div>
                        <input id="bairro" type="text" th:field="*{bairro}" maxlength="100"/>
                        <div class="error-text" th:if="${#fields.hasErrors('bairro')}" th:errors="*{bairro}"></div>
                    </div>

                    <label for="cidade">Cidade</label>
                    <div>
                        <input id="cidade" type="text" th:field="*{cidade}" maxlength="100"
                               autocomplete="address-level2"/>
                        <div class="error-text" th:if="${#fields.hasErrors('cidade')}" th:errors="*{cidade}"></div>
                    </div>

                    <label for="uf">UF</label>
                    <div>
                        <input id="uf" type="text" th:field="*{uf}" data-mask="uf" maxlength="2"
                               placeholder="SP" autocomplete="address-level1"/>
                        <div class="error-text" th:if="${#fields.hasErrors('uf')}" th:errors="*{uf}"></div>
                    </div>
                </div>

                <div style="margin-top:20px;">
                    <button type="submit" class="btn btn-primary"
                            th:text="${cliente.id() == null} ? 'Cadastrar cliente' : 'Salvar alterações'"></button>
                </div>
            </form>
        </div>

        <div th:if="${cliente.id() != null}" style="max-width:960px;margin-top:24px;">
            <div class="page-header">
                <h2 style="margin:0;">Veículos</h2>
                <div class="spacer"></div>
                <a th:href="@{/clientes/{id}/editar(id=${cliente.id()},mostrarTodosVeiculos=${!mostrarTodosVeiculos})}"
                   class="btn btn-secondary btn-sm"
                   th:text="${mostrarTodosVeiculos} ? 'Mostrar ativos' : 'Mostrar todos'"></a>
            </div>

            <div class="card" th:if="${cliente.ativo()}">
                <h3 th:text="${editandoVeiculo} ? 'Editar veículo' : 'Adicionar veículo'"></h3>
                <form th:action="@{/clientes/{id}/veiculos(id=${cliente.id()})}" th:object="${veiculo}" method="post">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <input th:if="*{id != null}" type="hidden" th:field="*{id}"/>

                    <div class="form-grid">
                        <label for="placa">Placa *</label>
                        <div>
                            <input id="placa" type="text" th:field="*{placa}" data-mask="placa" maxlength="8"
                                   placeholder="ABC1D23" autocomplete="off" required/>
                            <div class="error-text" th:if="${#fields.hasErrors('placa')}" th:errors="*{placa}"></div>
                        </div>

                        <label for="modelo">Modelo *</label>
                        <div>
                            <input id="modelo" type="text" th:field="*{modelo}" maxlength="100" required/>
                            <div class="error-text" th:if="${#fields.hasErrors('modelo')}" th:errors="*{modelo}"></div>
                        </div>

                        <label for="marca">Marca *</label>
                        <div>
                            <input id="marca" type="text" th:field="*{marca}" maxlength="60" required/>
                            <div class="error-text" th:if="${#fields.hasErrors('marca')}" th:errors="*{marca}"></div>
                        </div>

                        <label for="cor">Cor</label>
                        <div>
                            <input id="cor" type="text" th:field="*{cor}" maxlength="30"/>
                            <div class="error-text" th:if="${#fields.hasErrors('cor')}" th:errors="*{cor}"></div>
                        </div>

                        <label for="ano">Ano</label>
                        <div>
                            <input id="ano" type="number" th:field="*{ano}" min="1950" max="2100"/>
                            <div class="error-text" th:if="${#fields.hasErrors('ano')}" th:errors="*{ano}"></div>
                        </div>
                    </div>

                    <div style="margin-top:20px;display:flex;gap:10px;">
                        <button type="submit" class="btn btn-primary"
                                th:text="${editandoVeiculo} ? 'Salvar veículo' : 'Adicionar veículo'"></button>
                        <a th:if="${editandoVeiculo}" th:href="@{/clientes/{id}/editar(id=${cliente.id()})}"
                           class="btn btn-secondary">Cancelar edição</a>
                    </div>
                </form>
            </div>

            <table class="table" style="margin-top:16px;">
                <thead>
                <tr>
                    <th>Placa</th>
                    <th>Veículo</th>
                    <th>Cor</th>
                    <th>Ano</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${veiculos.isEmpty()}">
                    <td colspan="6" style="text-align:center;color:#64748b;">Nenhum veículo cadastrado.</td>
                </tr>
                <tr th:each="item : ${veiculos}">
                    <td th:text="${item.placa}"></td>
                    <td th:text="${item.marca + ' ' + item.modelo}"></td>
                    <td th:text="${item.cor} ?: '—'"></td>
                    <td th:text="${item.ano} ?: '—'"></td>
                    <td th:text="${item.ativo} ? 'Ativo' : 'Inativo'"></td>
                    <td>
                        <a th:if="${item.ativo and cliente.ativo()}"
                           th:href="@{/clientes/{clienteId}/veiculos/{veiculoId}/editar(clienteId=${cliente.id()},veiculoId=${item.id})}"
                           class="btn btn-secondary btn-sm">Editar</a>
                        <form th:if="${item.ativo}" th:action="@{/clientes/{clienteId}/veiculos/{veiculoId}/inativar(clienteId=${cliente.id()},veiculoId=${item.id})}"
                              method="post" style="display:inline;">
                            <div th:replace="~{fragments/csrf :: csrf}"></div>
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Inativar este veículo?')">Inativar</button>
                        </form>
                        <form th:if="${!item.ativo and cliente.ativo()}"
                              th:action="@{/clientes/{clienteId}/veiculos/{veiculoId}/reativar(clienteId=${cliente.id()},veiculoId=${item.id})}"
                              method="post" style="display:inline;">
                            <div th:replace="~{fragments/csrf :: csrf}"></div>
                            <button type="submit" class="btn btn-primary btn-sm">Reativar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
