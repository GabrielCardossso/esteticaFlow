<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Empresas')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div class="page-header">
            <h1 class="page-title">Empresas e assinaturas</h1>
            <div class="spacer"></div>
        </div>

        <form method="get" th:action="@{/empresas}" class="filter-bar">
            <input type="text" name="busca" th:value="${busca}"
                   placeholder="Buscar por nome fantasia, razão social ou CNPJ"/>
            <select name="plano">
                <option value="">Todos os planos</option>
                <option th:each="p : ${planos}" th:value="${p}" th:text="${p}"
                        th:selected="${planoFiltro != null && planoFiltro == p}"></option>
            </select>
            <select name="mostrarTodas">
                <option value="false" th:selected="${!mostrarTodas}">Ativas</option>
                <option value="true" th:selected="${mostrarTodas}">Todas</option>
            </select>
            <button type="submit" class="btn btn-secondary">Filtrar</button>
        </form>

        <div class="card" style="margin-bottom:20px;">
            <h3>Cadastrar empresa</h3>
            <form th:action="@{/empresas}" method="post" class="form-grid" style="margin-top:16px;">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <label>Razão social</label><input name="razaoSocial" required maxlength="150" autocomplete="organization"/>
                <label>Nome fantasia</label><input name="nomeFantasia" required maxlength="150" autocomplete="organization"/>
                <label>CNPJ</label><input name="cnpj" required data-mask="cnpj" maxlength="18"
                                          inputmode="numeric" autocomplete="off"/>
                <label>Telefone</label><input type="tel" name="telefone" data-mask="telefone" maxlength="15"
                                             inputmode="tel" autocomplete="tel"/>
                <label>E-mail da empresa</label><input type="email" name="email" maxlength="150" autocomplete="email"/>
                <label>Administrador inicial</label><input name="adminNome" required maxlength="150" autocomplete="name"/>
                <label>E-mail do administrador</label><input type="email" name="adminEmail" required maxlength="150"
                                                              autocomplete="username"/>
                <label>Senha inicial</label><input type="password" name="adminSenha" required minlength="6"
                                                   autocomplete="new-password"/>
                <label>Plano</label>
                <select name="plano" required data-plan-selector>
                    <option th:each="p : ${planos}" th:value="${p}" th:text="${p}"
                            th:attr="data-price=${p.valorMensalPadrao}"></option>
                </select>
                <label>Mensalidade</label>
                <input type="number" name="valorMensalidade" required min="0" step="0.01"
                       th:value="${planos[0].valorMensalPadrao}" data-plan-price/>
                <label>Próximo vencimento</label><input type="date" name="proximoVencimento" required/>
                <div></div><button class="btn btn-primary" type="submit">Cadastrar empresa</button>
            </form>
        </div>

        <div class="card" th:each="empresa : ${empresas}" style="margin-bottom:20px;">
            <h3 th:text="${empresa.nomeFantasia} + ' — ' + ${empresa.cnpj}"></h3>
            <p class="muted" th:text="'Status: ' + ${empresa.statusAssinatura} + ' | Ativa: ' + ${empresa.ativo}"></p>

            <form th:action="@{/empresas/{id}/assinatura(id=${empresa.id})}" method="post"
                  class="form-grid" style="margin-top:16px;">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <label>Plano</label>
                <select name="plano" required data-plan-selector>
                    <option th:each="p : ${planos}" th:value="${p}" th:text="${p}"
                            th:selected="${p == empresa.plano}" th:attr="data-price=${p.valorMensalPadrao}"></option>
                </select>
                <label>Mensalidade</label>
                <input type="number" name="valorMensalidade" min="0" step="0.01" required
                       th:value="${empresa.valorMensalidade}" data-plan-price/>
                <label>Vencimento</label>
                <input type="date" name="proximoVencimento" required th:value="${empresa.proximoVencimento}"/>
                <div></div><button class="btn btn-primary" type="submit">Salvar assinatura</button>
            </form>

            <div class="actions" style="margin-top:16px;">
                <form th:action="@{/empresas/{id}/pagamento(id=${empresa.id})}" method="post">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <button class="btn btn-secondary" type="submit">Registrar pagamento</button>
                </form>
                <form th:if="${empresa.statusAssinatura.name() != 'BLOQUEADA'}"
                      th:action="@{/empresas/{id}/bloquear(id=${empresa.id})}" method="post" class="payment-form">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <input name="motivo" required maxlength="500" placeholder="Motivo do bloqueio"/>
                    <label><input type="checkbox" name="manual" value="true"/> Manual</label>
                    <button class="btn btn-secondary" type="submit">Bloquear</button>
                </form>
                <form th:if="${empresa.statusAssinatura.name() == 'BLOQUEADA'}"
                      th:action="@{/empresas/{id}/desbloquear(id=${empresa.id})}" method="post">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <button class="btn btn-secondary" type="submit">Desbloquear</button>
                </form>
                <form th:if="${empresa.ativo}" th:action="@{/empresas/{id}/inativar(id=${empresa.id})}" method="post">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <input type="hidden" name="mostrarTodas" th:value="${mostrarTodas}"/>
                    <button class="btn btn-secondary" type="submit">Inativar</button>
                </form>
                <form th:unless="${empresa.ativo}" th:action="@{/empresas/{id}/reativar(id=${empresa.id})}" method="post">
                    <div th:replace="~{fragments/csrf :: csrf}"></div>
                    <input type="hidden" name="mostrarTodas" th:value="${mostrarTodas}"/>
                    <button class="btn btn-primary" type="submit">Reativar</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script>
    document.querySelectorAll("[data-plan-selector]").forEach(function (select) {
        select.addEventListener("change", function () {
            var price = select.options[select.selectedIndex].dataset.price;
            select.closest("form").querySelector("[data-plan-price]").value = price;
        });
    });
</script>
</body>
</html>
