<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Agenda')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="page-header">
            <h1 class="page-title">Agenda</h1>
            <div class="spacer"></div>
            <a th:href="@{/agenda(data=${dataAnterior}, periodo=${periodo}, status=${statusFiltro}, funcionarioId=${funcionarioId}, pago=${pago}, q=${q})}"
               class="btn btn-secondary">‹ Dia anterior</a>
            <a th:href="@{/agenda(periodo=${periodo}, status=${statusFiltro}, funcionarioId=${funcionarioId}, pago=${pago}, q=${q})}"
               class="btn btn-secondary">Hoje</a>
            <a th:href="@{/agenda(data=${dataProxima}, periodo=${periodo}, status=${statusFiltro}, funcionarioId=${funcionarioId}, pago=${pago}, q=${q})}"
               class="btn btn-secondary">Próximo dia ›</a>
            <a th:href="@{/agenda/novo(data=${data})}" class="btn btn-primary">+ Agendar</a>
        </div>

        <p class="page-subtitle">
            <span th:if="${periodo == 'DIA'}">
                Agendamentos de <strong th:text="${#temporals.format(data, 'dd/MM/yyyy')}"></strong>
            </span>
            <span th:if="${periodo == 'AMANHA'}">
                Agendamentos de amanhã (<strong th:text="${#temporals.format(intervaloInicio, 'dd/MM/yyyy')}"></strong>)
            </span>
            <span th:if="${periodo == 'SEMANA'}">
                Semana de <strong th:text="${#temporals.format(intervaloInicio, 'dd/MM/yyyy')}"></strong>
                a <strong th:text="${#temporals.format(intervaloFim, 'dd/MM/yyyy')}"></strong>
            </span>
            <span th:if="${periodo == 'MES'}">
                Mês de <strong th:text="${#temporals.format(intervaloInicio, 'MMMM yyyy')}"></strong>
            </span>
        </p>

        <form method="get" th:action="@{/agenda}" class="filter-bar">
            <input type="hidden" name="data" th:value="${data}"/>
            <select name="periodo">
                <option value="DIA" th:selected="${periodo == 'DIA'}">Dia</option>
                <option value="AMANHA" th:selected="${periodo == 'AMANHA'}">Amanhã</option>
                <option value="SEMANA" th:selected="${periodo == 'SEMANA'}">Semana</option>
                <option value="MES" th:selected="${periodo == 'MES'}">Mês</option>
            </select>
            <select name="status">
                <option value="">Todos os status</option>
                <option th:each="st : ${statusValues}" th:value="${st.name()}" th:text="${st.rotulo()}"
                        th:selected="${statusFiltro != null && statusFiltro == st}"></option>
            </select>
            <select name="funcionarioId">
                <option value="">Todos os funcionários</option>
                <option th:each="func : ${funcionarios}" th:value="${func.id}"
                        th:text="${func.usuario.nome}"
                        th:selected="${funcionarioId != null && funcionarioId == func.id}"></option>
            </select>
            <select name="pago">
                <option value="" th:selected="${pago == null}">Pagamento (todos)</option>
                <option th:value="true" th:selected="${pago != null && pago}">Pago</option>
                <option th:value="false" th:selected="${pago != null && !pago}">Pendente</option>
            </select>
            <input type="text" name="q" th:value="${q}" placeholder="Cliente ou placa"/>
            <button type="submit" class="btn btn-secondary">Filtrar</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th th:if="${periodo == 'SEMANA' || periodo == 'MES'}">Data</th>
                <th>Horário</th>
                <th>Cliente</th>
                <th>Veículo</th>
                <th>Serviços</th>
                <th>Total</th>
                <th>Status</th>
                <th>Pagamento</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${agendamentos.isEmpty()}">
                <td th:colspan="${periodo == 'SEMANA' || periodo == 'MES' ? 9 : 8}" class="table-empty">
                    Nenhum agendamento encontrado para os filtros selecionados.
                </td>
            </tr>
            <tr th:each="ag : ${agendamentos}" class="row-clickable"
                th:onclick="|window.location='@{/agenda/{id}(id=${ag.id})}'|">
                <td th:if="${periodo == 'SEMANA' || periodo == 'MES'}"
                    th:text="${#temporals.format(ag.dataHora, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(ag.dataHora, 'HH:mm')}"></td>
                <td th:text="${ag.cliente.nome}"></td>
                <td th:text="${ag.veiculo.modelo} + ' — ' + ${ag.veiculo.placa}"></td>
                <td>
                    <span th:text="${ag.nomesServicos()}"></span>
                    <span th:if="${ag.observacoes != null}" class="obs-dot" title="Possui observações">●</span>
                </td>
                <td>
                    <strong th:text="'R$ ' + ${#numbers.formatDecimal(ag.total, 1, 'POINT', 2, 'COMMA')}"></strong>
                    <small th:if="${ag.desconto.signum() > 0}" class="muted"
                           th:text="' (desconto R$ ' + ${#numbers.formatDecimal(ag.desconto, 1, 'POINT', 2, 'COMMA')} + ')'"></small>
                </td>
                <td>
                    <span class="status-badge"
                          th:classappend="${ag.status.name() == 'AGENDADO'} ? ' status-agendado' :
                                          (${ag.status.name() == 'EM_ANDAMENTO'} ? ' status-em-andamento' :
                                          (${ag.status.name() == 'CONCLUIDO'} ? ' status-concluido' : ' status-cancelado'))"
                          th:text="${ag.status.rotulo()}"></span>
                </td>
                <td th:text="${ag.pago} ? 'Pago' : 'Pendente'"></td>
                <td class="appointment-actions" onclick="event.stopPropagation()">
                    <a th:href="@{/agenda/{id}(id=${ag.id})}" class="btn btn-secondary btn-sm">Detalhes</a>
                    <form th:if="${ag.status.name() == 'AGENDADO'}"
                          th:action="@{/agenda/{id}/iniciar(id=${ag.id})}" method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="hidden" name="data" th:value="${data}"/>
                        <button class="btn btn-primary btn-sm" type="submit">Iniciar</button>
                    </form>
                    <form th:if="${ag.status.name() == 'AGENDADO' || ag.status.name() == 'EM_ANDAMENTO'}"
                          th:action="@{/agenda/{id}/cancelar(id=${ag.id})}" method="post"
                          data-confirm="Deseja cancelar este agendamento? O horário será liberado.">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="hidden" name="data" th:value="${data}"/>
                        <button class="btn btn-danger btn-sm" type="submit">Cancelar</button>
                    </form>
                    <form th:if="${ag.status.name() == 'EM_ANDAMENTO' && !ag.pago}" class="payment-form"
                          th:action="@{/agenda/{id}/marcar-pago(id=${ag.id})}" method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="hidden" name="data" th:value="${data}"/>
                        <select name="formaPagamentoId" required>
                            <option value="">Forma de pagamento</option>
                            <option th:each="forma : ${formasPagamento}" th:value="${forma.id}" th:text="${forma.nome}"></option>
                        </select>
                        <button class="btn btn-secondary btn-sm" type="submit">Marcar pago</button>
                    </form>
                    <form th:if="${ag.status.name() == 'EM_ANDAMENTO'}"
                          th:action="@{/agenda/{id}/concluir(id=${ag.id})}" method="post"
                          data-confirm="Concluir este atendimento? O status passará para CONCLUÍDO.">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="hidden" name="data" th:value="${data}"/>
                        <button class="btn btn-primary btn-sm" type="submit">Concluir atendimento</button>
                    </form>
                    <form th:if="${ag.status.name() == 'CONCLUIDO' && !ag.pago}" class="payment-form"
                          th:action="@{/agenda/{id}/pagamento(id=${ag.id})}" method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="hidden" name="data" th:value="${data}"/>
                        <select name="formaPagamentoId" required>
                            <option value="">Forma de pagamento</option>
                            <option th:each="forma : ${formasPagamento}" th:value="${forma.id}" th:text="${forma.nome}"></option>
                        </select>
                        <button class="btn btn-primary btn-sm" type="submit">Registrar pagamento</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
<script th:src="@{/js/ui-confirm.js}" defer></script>
</body>
</html>
