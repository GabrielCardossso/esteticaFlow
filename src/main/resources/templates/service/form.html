<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${servico.id() == null ? 'Novo serviço' : 'Editar serviço'})}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div class="page-header">
            <h1 class="page-title" th:text="${servico.id() == null ? 'Novo serviço' : 'Editar serviço'}"></h1>
            <div class="spacer"></div>
            <a th:href="@{/servicos}" class="btn btn-secondary">Voltar</a>
        </div>
        <div class="card form-card">
            <form th:action="@{/servicos}" th:object="${servico}" method="post">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{ativo}"/>
                <div class="form-grid">
                    <label for="nome">Nome *</label>
                    <div><input id="nome" type="text" th:field="*{nome}" maxlength="150" required/>
                        <div class="error-text" th:errors="*{nome}"></div></div>
                    <label for="categoria">Categoria *</label>
                    <div><select id="categoria" th:field="*{categoriaServicoId}" required>
                        <option value="">Selecione...</option>
                        <option th:each="categoria : ${categorias}" th:value="${categoria.id}"
                                th:text="${categoria.nome}"></option>
                    </select><div class="error-text" th:errors="*{categoriaServicoId}"></div></div>
                    <label for="preco">Preço *</label>
                    <div><input id="preco" type="number" th:field="*{preco}" min="0.01" step="0.01" required/>
                        <div class="error-text" th:errors="*{preco}"></div></div>
                    <label for="duracao">Duração (min) *</label>
                    <div><input id="duracao" type="number" th:field="*{tempoEstimadoMinutos}" min="1" required/>
                        <div class="error-text" th:errors="*{tempoEstimadoMinutos}"></div></div>
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" th:field="*{descricao}" rows="4" maxlength="500"></textarea>
                </div>
                <div class="form-actions"><button type="submit" class="btn btn-primary">Salvar serviço</button></div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
