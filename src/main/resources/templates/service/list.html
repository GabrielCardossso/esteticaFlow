<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Serviços')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div class="page-header">
            <h1 class="page-title">Serviços</h1>
            <div class="spacer"></div>
            <form method="get" th:action="@{/servicos}" class="inline-form">
                <input type="hidden" name="mostrarTodasCategorias" th:value="${mostrarTodasCategorias}"/>
                <select name="mostrarTodos" onchange="this.form.submit()">
                    <option value="false" th:selected="${!mostrarTodos}">Ativos</option>
                    <option value="true" th:selected="${mostrarTodos}">Todos</option>
                </select>
            </form>
            <a th:href="@{/servicos/novo}" class="btn btn-primary">+ Novo serviço</a>
        </div>

        <div class="card category-manager">
            <div>
                <h3>Categorias de serviços</h3>
                <form method="get" th:action="@{/servicos}" class="inline-form">
                    <input type="hidden" name="mostrarTodos" th:value="${mostrarTodos}"/>
                    <select name="mostrarTodasCategorias" onchange="this.form.submit()">
                        <option value="false" th:selected="${!mostrarTodasCategorias}">Ativas</option>
                        <option value="true" th:selected="${mostrarTodasCategorias}">Todas</option>
                    </select>
                </form>
                <div class="category-list" th:if="${!categorias.isEmpty()}">
                    <div th:each="categoria : ${categorias}" class="actions">
                        <span class="category-chip"
                              th:text="${categoria.nome} + ' — ' + (${categoria.ativo} ? 'Ativa' : 'Inativa')"></span>
                        <form th:if="${categoria.ativo}"
                              th:action="@{/servicos/categorias/{id}/inativar(id=${categoria.id})}" method="post">
                            <div th:replace="~{fragments/csrf :: csrf}"></div>
                            <button class="btn btn-danger btn-sm" type="submit">Inativar</button>
                        </form>
                        <form th:unless="${categoria.ativo}"
                              th:action="@{/servicos/categorias/{id}/reativar(id=${categoria.id})}" method="post">
                            <div th:replace="~{fragments/csrf :: csrf}"></div>
                            <button class="btn btn-primary btn-sm" type="submit">Reativar</button>
                        </form>
                    </div>
                </div>
                <p class="muted" th:if="${categorias.isEmpty()}">Nenhuma categoria cadastrada.</p>
            </div>
            <form th:action="@{/servicos/categorias}" method="post" class="inline-form">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <input type="text" name="nome" maxlength="100" placeholder="Nova categoria" required/>
                <button type="submit" class="btn btn-primary">Adicionar categoria</button>
            </form>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Duração</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${servicos.isEmpty()}">
                <td colspan="6" class="empty-state">Nenhum serviço cadastrado.</td>
            </tr>
            <tr th:each="servico : ${servicos}">
                <td th:text="${servico.nome}"></td>
                <td th:text="${servico.categoriaServico.nome}"></td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${servico.tempoEstimadoMinutos} + ' min'"></td>
                <td th:text="${servico.ativo} ? 'Ativo' : 'Inativo'"></td>
                <td class="actions">
                    <a th:href="@{/servicos/{id}/editar(id=${servico.id})}" class="btn btn-secondary btn-sm">Editar</a>
                    <form th:if="${servico.ativo}" th:action="@{/servicos/{id}/inativar(id=${servico.id})}"
                          method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Inativar este serviço?')">Inativar</button>
                    </form>
                    <form th:unless="${servico.ativo}" th:action="@{/servicos/{id}/reativar(id=${servico.id})}"
                          method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-primary btn-sm">Reativar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
