<th:block th:fragment="sidebar">
<nav class="side-menu" aria-label="Menu principal">
    <div class="mobile-topbar">
        <button type="button" class="mobile-menu-toggle" aria-label="Abrir menu" aria-controls="side-menu-links" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="brand mobile-brand">EsteticaFlow</div>
    </div>

    <div class="side-menu-links" id="side-menu-links">
        <div class="brand desktop-brand">EsteticaFlow</div>
        <hr class="desktop-brand-divider"/>

        <a th:href="@{/dashboard}" class="menu-button" th:classappend="${menuAtivo == 'dashboard'} ? ' active'">Dashboard</a>
        <a th:href="@{/notificacoes}" class="menu-button" th:classappend="${menuAtivo == 'notificacoes'} ? ' active'">
            <span>Notificações</span>
            <span th:if="${notificacoesNaoLidas != null and notificacoesNaoLidas > 0}"
                  class="menu-badge" th:text="${notificacoesNaoLidas}"
                  th:aria-label="${notificacoesNaoLidas} + ' não lidas'"></span>
        </a>
        <a th:href="@{/clientes}" class="menu-button" th:classappend="${menuAtivo == 'clientes'} ? ' active'">Clientes</a>
        <a th:href="@{/servicos}" class="menu-button" th:classappend="${menuAtivo == 'servicos'} ? ' active'">Serviços</a>
        <a th:href="@{/agenda}" class="menu-button" th:classappend="${menuAtivo == 'agenda'} ? ' active'">Agenda</a>
        <a th:if="${podeEstoque}" th:href="@{/estoque}" class="menu-button" th:classappend="${menuAtivo == 'estoque'} ? ' active'">Estoque</a>
        <a th:if="${podeFinanceiro}" th:href="@{/financeiro}" class="menu-button" th:classappend="${menuAtivo == 'financeiro'} ? ' active'">Financeiro</a>
        <a th:if="${podeRelatorios}" th:href="@{/relatorios}" class="menu-button" th:classappend="${menuAtivo == 'relatorios'} ? ' active'">Relatórios</a>
        <a th:if="${superAdmin}" th:href="@{/empresas}" class="menu-button" th:classappend="${menuAtivo == 'empresas'} ? ' active'">Empresas</a>
        <a th:if="${superAdmin}" th:href="@{/historico}" class="menu-button" th:classappend="${menuAtivo == 'historico'} ? ' active'">Histórico</a>

        <div class="menu-spacer" aria-hidden="true"></div>
        <hr class="menu-footer-divider"/>
        <a th:href="@{/configuracoes}" class="menu-button" th:classappend="${menuAtivo == 'configuracoes'} ? ' active'">
            Configurações
        </a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="menu-button logout" aria-label="Sair da conta">Sair</button>
        </form>
    </div>
    <div class="mobile-nav-backdrop" hidden></div>
</nav>

<header class="app-header" role="banner">
    <div class="global-search" data-global-search>
        <label class="sr-only" for="global-search-input">Pesquisa global</label>
        <input id="global-search-input" type="search" class="global-search-input"
               placeholder="Pesquisar clientes, veículos, agenda…"
               autocomplete="off" aria-autocomplete="list" aria-controls="global-search-modal"
               aria-expanded="false" data-global-search-input/>
        <kbd class="global-search-kbd" aria-hidden="true">Ctrl K</kbd>
    </div>
</header>

<div id="global-search-modal" class="global-search-modal" hidden data-global-search-modal>
    <div class="global-search-backdrop" data-global-search-close></div>
    <div class="global-search-card" role="dialog" aria-modal="true" aria-labelledby="global-search-title">
        <div class="global-search-card-header">
            <h2 id="global-search-title">Resultados da pesquisa</h2>
            <button type="button" class="btn btn-secondary btn-sm" data-global-search-close aria-label="Fechar">Fechar</button>
        </div>
        <div class="global-search-card-body" data-global-search-results></div>
    </div>
</div>
</th:block>
