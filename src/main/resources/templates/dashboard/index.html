<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="'Olá, ' + ${nomeSaudacao} + '!'">Olá!</h1>
                <span class="muted">Veja como está o seu negócio hoje.</span>
            </div>
            <div class="spacer"></div>
            <a th:href="@{/dashboard}" class="btn btn-secondary">Atualizar</a>
        </div>

        <div th:if="${assinaturaEmAtraso}" class="alert alert-error" style="margin-bottom:20px;"
             th:text="'Mensalidade em atraso há ' + ${diasAtrasoAssinatura} + ' dia(s). Regularize a assinatura para evitar bloqueio após a tolerância de 7 dias.'">
        </div>

        <div class="kpi-grid">
            <div class="card" th:if="${podeFinanceiro}">
                <div class="kpi-label">Receita do mês</div>
                <div class="kpi-value" th:text="'R$ ' + ${#numbers.formatDecimal(dados.receitaDoMes(), 1, 'POINT', 2, 'COMMA')}"></div>
            </div>
            <div class="card" th:if="${podeFinanceiro}">
                <div class="kpi-label">Despesas</div>
                <div class="kpi-value" th:text="'R$ ' + ${#numbers.formatDecimal(dados.despesasDoMes(), 1, 'POINT', 2, 'COMMA')}"></div>
            </div>
            <div class="card" th:if="${podeFinanceiro}">
                <div class="kpi-label">Saldo</div>
                <div class="kpi-value" th:text="'R$ ' + ${#numbers.formatDecimal(dados.saldoDoMes(), 1, 'POINT', 2, 'COMMA')}"></div>
            </div>
            <div class="card" th:if="${podeFinanceiro}">
                <div class="kpi-label">Ticket médio</div>
                <div class="kpi-value" th:text="'R$ ' + ${#numbers.formatDecimal(dados.ticketMedio(), 1, 'POINT', 2, 'COMMA')}"></div>
            </div>
            <div class="card">
                <div class="kpi-label">Agendamentos hoje</div>
                <div class="kpi-value" th:text="${dados.agendamentosHoje()}"></div>
            </div>
            <div class="card">
                <div class="kpi-label">Concluídos no mês</div>
                <div class="kpi-value" th:text="${dados.servicosConcluidosNoMes()}"></div>
            </div>
        </div>

        <div class="chart-container" th:if="${podeFinanceiro}">
            <canvas id="faturamentoChart" height="80"></canvas>
        </div>

        <div class="two-columns">
            <div class="card" th:if="${podeEstoque}">
                <h3>Alertas de estoque baixo</h3>
                <ul th:if="${!dados.alertasEstoque().isEmpty()}">
                    <li th:each="alerta : ${dados.alertasEstoque()}" class="low-stock"
                        th:text="${alerta.produto()} + ': ' + ${alerta.atual().stripTrailingZeros().toPlainString()} + ' / mínimo ' + ${alerta.minimo().stripTrailingZeros().toPlainString()}"></li>
                </ul>
                <p th:if="${dados.alertasEstoque().isEmpty()}" style="color:#64748b;">Nenhum alerta no momento.</p>
            </div>
            <div class="card">
                <h3>Próximos agendamentos de hoje</h3>
                <ul th:if="${!dados.agendamentosDoDia().isEmpty()}">
                    <li th:each="ag : ${dados.agendamentosDoDia()}"
                        th:text="${#temporals.format(ag.dataHora(), 'HH:mm')} + ' — ' + ${ag.cliente()} + ' | ' + ${ag.servico()}"></li>
                </ul>
                <p th:if="${dados.agendamentosDoDia().isEmpty()}" style="color:#64748b;">Nenhum agendamento para hoje.</p>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const labels = /*[[${dados.graficoFaturamento().![mes]}]]*/ [];
    const valores = /*[[${dados.graficoFaturamento().![valor]}]]*/ [];
    const faturamentoCanvas = document.getElementById('faturamentoChart');
    if (faturamentoCanvas) {
    new Chart(faturamentoCanvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Faturamento — últimos 6 meses',
                data: valores,
                borderColor: '#157f8f',
                backgroundColor: 'rgba(21, 127, 143, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: true } },
            scales: { y: { beginAtZero: true } }
        }
    });
    }
</script>
</body>
</html>
