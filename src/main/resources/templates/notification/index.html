<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Notificações')}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="page-header">
            <h1 class="page-title">Notificações</h1>
            <div class="spacer"></div>
            <form th:action="@{/notificacoes/lidas}" method="post">
                <div th:replace="~{fragments/csrf :: csrf}"></div>
                <button type="submit" class="btn btn-secondary">Marcar todas como lidas</button>
            </form>
        </div>

        <div class="card" style="margin-bottom:20px;" th:if="${superAdmin and solicitacoesPendentes != null and !solicitacoesPendentes.isEmpty()}">
            <h3>Solicitações de alteração de empresa</h3>
            <p class="muted">Empresas pedindo autorização da EsteticaFlow para mudar dados cadastrais.</p>
            <div th:each="sol : ${solicitacoesPendentes}" class="notification-item notification-pending">
                <div>
                    <strong th:text="${nomesEmpresasSolicitacao[sol.id]} ?: ('Empresa #' + sol.empresaId)"></strong>
                    <p class="muted" style="margin:6px 0;">
                        <span th:text="${sol.razaoSocial}"></span> ·
                        <span th:text="${sol.nomeFantasia}"></span> ·
                        CNPJ <span th:text="${sol.cnpj}"></span>
                        <span th:if="${sol.telefone != null}"> · <span th:text="${sol.telefone}"></span></span>
                        <span th:if="${sol.email != null}"> · <span th:text="${sol.email}"></span></span>
                    </p>
                    <small class="muted" th:text="${#temporals.format(sol.dataCriacao, 'dd/MM/yyyy HH:mm')}"></small>
                </div>
                <div class="actions" style="flex-wrap:wrap;gap:8px;">
                    <form th:action="@{/notificacoes/solicitacoes/{id}/aprovar(id=${sol.id})}" method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-primary btn-sm"
                                data-confirm="Aprovar e aplicar os novos dados desta empresa?">Aprovar</button>
                    </form>
                    <form th:action="@{/notificacoes/solicitacoes/{id}/rejeitar(id=${sol.id})}" method="post"
                          style="display:flex;gap:6px;align-items:center;">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <input type="text" name="motivo" placeholder="Motivo (opcional)" maxlength="500"
                               style="min-width:180px;"/>
                        <button type="submit" class="btn btn-danger btn-sm"
                                data-confirm="Rejeitar esta solicitação?">Rejeitar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 th:text="${superAdmin} ? 'Avisos da plataforma' : 'Alertas da sua empresa'">Alertas</h3>
            <p th:if="${notificacoes.isEmpty()}" class="muted">Nenhuma notificação no momento.</p>
            <div th:each="n : ${notificacoes}" class="notification-item"
                 th:classappend="${n.lida} ? ' notification-read' : ' notification-unread'">
                <div>
                    <strong th:text="${n.titulo}"></strong>
                    <p style="margin:6px 0;" th:text="${n.mensagem}"></p>
                    <small class="muted" th:text="${#temporals.format(n.dataCriacao, 'dd/MM/yyyy HH:mm')}"></small>
                    <span class="status-badge" style="margin-left:8px;" th:text="${n.tipo}"></span>
                </div>
                <div class="actions">
                    <a th:if="${n.acaoUrl != null}" th:href="@{${n.acaoUrl}}" class="btn btn-secondary btn-sm">Abrir</a>
                    <form th:if="${!n.lida}" th:action="@{/notificacoes/{id}/lida(id=${n.id})}" method="post">
                        <div th:replace="~{fragments/csrf :: csrf}"></div>
                        <button type="submit" class="btn btn-primary btn-sm">Marcar lida</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
