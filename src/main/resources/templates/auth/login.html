<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
<div class="login-page">
    <form class="login-card" th:action="@{/login}" method="post">
        <div th:replace="~{fragments/csrf :: csrf}"></div>
        <div class="logo">EsteticaFlow</div>
        <div class="subtitle">Gestão para estética automotiva</div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <div th:if="${param.empresaIndisponivel}" class="alert alert-error">
            A empresa está inativa, bloqueada ou com a assinatura cancelada. Contate o suporte.
        </div>

        <label class="sr-only" for="login-email">E-mail</label>
        <input id="login-email" type="email" name="email" placeholder="E-mail" autocomplete="username" required autofocus/>
        <label class="sr-only" for="login-senha">Senha</label>
        <input id="login-senha" type="password" name="senha" placeholder="Senha" autocomplete="current-password" required/>
        <button type="submit" class="btn btn-primary login-submit">ENTRAR</button>
        <a th:href="@{/#planos}" class="login-signup-link">Não tem uma conta? Faça a sua</a>
        <a th:href="@{/}" class="login-home-link">← Voltar para a página inicial</a>
    </form>
</div>
</body>
</html>
